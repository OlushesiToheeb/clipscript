# Render Blueprint — provisions the Clipscript app services:
#   1. clipscript-backend  — NestJS API (Docker: bundles the Linux yt-dlp binary)
#   2. clipscript-frontend — Next.js UI (Node)
#
# The database is hosted on Supabase (not Render). Set DATABASE_URL on the
# backend to Supabase's SESSION POOLER connection string (IPv4, port 5432):
#   postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:5432/postgres
# DB_SSL=true is required — Supabase only accepts TLS connections.
#
# Values to set in the dashboard (secrets / not committed):
#   - DATABASE_URL   → Supabase session-pooler string (above).
#   - OPENAI_API_KEY → the switch that unlocks the paid audio path (TikTok /
#     Instagram / uncaptioned YouTube). Unset → only free YouTube-with-captions.
#   - FRONTEND_URL   → the frontend's URL (drives CORS), e.g.
#     https://clipscript-frontend.onrender.com. Changing it only restarts the backend.
#
# Note on Render's free tier: web services spin down after ~15 min idle (first
# request cold-starts, ~30-60s). Low impact — the DB is just a cache and history
# lives in the browser.

services:
  # ---- Backend API ----
  - type: web
    name: clipscript-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      # Supabase session-pooler connection string. Set in the dashboard.
      - key: DATABASE_URL
        sync: false
      # Supabase requires TLS.
      - key: DB_SSL
        value: "true"
      # Signs transcript tokens. Auto-generated once and kept stable across deploys.
      - key: TOKEN_SECRET
        generateValue: true
      # The switch. Set in the dashboard to enable the paid transcription path.
      - key: OPENAI_API_KEY
        sync: false
      # Allowed browser origin for CORS. Set to the frontend URL after first deploy.
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production

  # ---- Frontend UI ----
  - type: web
    name: clipscript-frontend
    runtime: node
    plan: free
    rootDir: frontend
    # NEXT_PUBLIC_API_URL is inlined into the client bundle at build time. Render's
    # fromService `host` returns only the internal host (no .onrender.com), which
    # truncated the API URL, so we set the backend's PUBLIC url explicitly here.
    # Update this value if the backend service is ever recreated with a new URL.
    buildCommand: npm ci && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_API_URL
        value: https://clipscript-backend-ipra.onrender.com
