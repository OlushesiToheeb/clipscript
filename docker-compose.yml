services:
  postgres:
    image: postgres:17-alpine
    container_name: clipscript-postgres
    environment:
      POSTGRES_USER: clipscript
      POSTGRES_PASSWORD: clipscript
      POSTGRES_DB: clipscript
    ports:
      - '5544:5432'
    volumes:
      - clipscript_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clipscript']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clipscript_pgdata:
